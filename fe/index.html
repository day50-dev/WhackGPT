<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhackGPT</title>
  <link rel="stylesheet" href="styles.css?2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&amp;display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="new-chat">
        <button id="newChatBtn"><i class="fas fa-plus"></i> New Chat</button>
      </div>
      <div class="topic" id="topicList"></div>
      <div class="settings">
        <button id="settingsBtn"><a class="logo" target="_blank" href="https://github.com/day50-dev/whackgpt">CODE</a></button>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="regex search..." />
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>
    </aside>
    
    <main class="chat-container">
      
      <div class="messages" id="messagesContainer">
        <div class="welcome-message">
          <h2>WhackGPT</h2>
          <div class="pill-container" id="pillList">
          </div>
        </div>
      </div>
      
      <div class="input-area">
        <form id="messageForm">
          <div class="input-container">
            <textarea 
              id="messageInput" 
              placeholder="WhackGPT is eager to chat..."
              rows="1"
              autofocus></textarea>
            <button type="submit" id="sendBtn">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </form>
        <p class="disclaimer">This is shared chaos. Nothing is private. Everything is a lie.</p>
      </div>
    </main>
    <div class="hamburger-menu">
      <i class="fas fa-bars"></i>
    </div>
    <div class="survey-overlay" id="surveyOverlay">
      <div class="survey-modal">
        <div class="survey-question">How satisfied are you with how WhackGPT answered your question today?</div>
        <div class="survey-buttons" id="surveyButtons">
          <button data-rating="1">1<br><small>Very</small></button>
          <button data-rating="2">2<br><small>Highly</small></button>
          <button data-rating="3">3<br><small>Utterly</small></button>
          <button data-rating="4">4<br><small>Profoundly</small></button>
          <button data-rating="5">5<br><small>Intensely</small></button>
        </div>
        <div class="survey-thanks" id="surveyThanks"></div>
      </div>
    </div>
  <script src="script.js"></script>
</body>
</html>
